function getSafeStorageName(value){

    return String(value || "unknown")
        .replace(/[\\/:*?"<>|.#$\[\]]/g, "_")
        .replace(/\s+/g, "_");
}

function sanitizeHistoryForCloud(item){

    const cloudItem = { ...item };

    // 예전 단일 사진 구조는 Firestore 용량 초과를 막기 위해 클라우드 저장에서 제외한다.
    if(cloudItem.photo && String(cloudItem.photo).startsWith("data:image/")){
        delete cloudItem.photo;
        delete cloudItem.photoDate;
    }

    // photos 배열 중 Firebase Storage URL 또는 일반 URL만 Firestore에 저장한다.
    // Base64 DataURL은 문서 크기 1MB 제한을 넘길 수 있어 제외한다.
    if(Array.isArray(cloudItem.photos)){
        cloudItem.photos = cloudItem.photos.filter(photo =>
            photo &&
            photo.url &&
            !String(photo.url).startsWith("data:image/")
        );
    }

    return cloudItem;
}

async function saveUserDataToCloud(){

    if(!currentUser){
        return;
    }

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    await setDoc(doc(db, "users", currentUser.uid), {
        uid: currentUser.uid,
        name: currentUser.displayName,
        email: currentUser.email,
        updatedAt: new Date().toISOString()
    }, { merge:true });

    for(const item of history){

        if(!item || !item.station){
            continue;
        }

        const historyId = item.station.replace(/[\/.#$\[\]]/g, "_");

        await setDoc(
            doc(db, "users", currentUser.uid, "histories", historyId),
            sanitizeHistoryForCloud(item),
            { merge:true }
        );
    }
}

async function loadUserDataFromCloud(){

    if(!currentUser){
        return;
    }

    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
        await saveUserDataToCloud();
        return;
    }

    const historyRef = collection(db, "users", currentUser.uid, "histories");
    const historySnap = await getDocs(historyRef);

    const history = [];

    historySnap.forEach(function(docSnap){
        history.push(docSnap.data());
    });

    console.log("Firestore histories 개수:", historySnap.size);
    console.log("Firestore histories 데이터:", history);

    history.sort(function(a, b){
        return String(b.date).localeCompare(String(a.date));
    });

    localStorage.setItem("amudenaHistory", JSON.stringify(history));

    loadHistory();
    updateStampSummary();
}

window.saveUserDataToCloud = saveUserDataToCloud;

async function uploadVisitPhotoToStorage(stationName, fileBlob, originalFileName){

    if(!currentUser){
        throw new Error("로그인 정보가 없습니다.");
    }

    const safeStation = getSafeStorageName(stationName);
    const safeFileName = getSafeStorageName(originalFileName || "visit-photo.jpg");
    const path = `users/${currentUser.uid}/visit-photos/${safeStation}/${Date.now()}_${safeFileName}`;
    const photoRef = ref(storage, path);

    await uploadBytes(photoRef, fileBlob, {
        contentType: fileBlob.type || "image/jpeg"
    });

    const url = await getDownloadURL(photoRef);

    return {
        url: url,
        path: path
    };
}

window.uploadVisitPhotoToStorage = uploadVisitPhotoToStorage;

async function deleteVisitPhotoFromStorage(path){

    if(!currentUser || !path){
        return;
    }

    try{
        await deleteObject(ref(storage, path));
    }catch(e){
        console.log("Storage 사진 삭제 실패:", e);
    }
}

window.deleteVisitPhotoFromStorage = deleteVisitPhotoFromStorage;

async function deleteUserHistoryFromCloud(stationName){

    if(!currentUser || !stationName){
        return;
    }

    const historyId = stationName.replace(/[\/.#$\[\]]/g, "_");

    await deleteDoc(
        doc(db, "users", currentUser.uid, "histories", historyId)
    );
}

window.deleteUserHistoryFromCloud = deleteUserHistoryFromCloud;

async function clearUserHistoryFromCloud(){

    if(!currentUser){
        return;
    }

    const historyRef = collection(db, "users", currentUser.uid, "histories");
    const historySnap = await getDocs(historyRef);

    for(const docSnap of historySnap.docs){
        await deleteDoc(docSnap.ref);
    }
}

window.clearUserHistoryFromCloud = clearUserHistoryFromCloud;

<script>
/* =========================
   전역 상태값
========================= */
let subwayData = null;              // subway.json 전체 데이터
let selectedStation = "";           // 현재 뽑힌 역명
let map = null;                     // 랜덤 결과 지도 객체
let marker = null;                  // 랜덤 결과 마커 객체
let currentResult = null;           // 현재 뽑힌 목적지 정보
let selectedStationPosition = null; // 현재 뽑힌 역 좌표
let visitedMap = null;              // 방문지도 지도 객체
let visitedMarkers = [];            // 방문지도 마커 목록
let confirmCallback = null;         // 커스텀 confirm 확인 콜백

/* =========================
   테스트용 거리 제한 우회 설정
   - 아래 이메일에 해당하는 로그인 사용자는 위치와 상관없이 스탬프 가능
   - 실제 배포 전에는 테스트 이메일을 제거하거나 주석 처리
========================= */
const DISTANCE_FREE_TEST_EMAILS = [
    "park3jr@gmail.com"
];

function isDistanceFreeTestUser(){

    const email = String(window.currentUserEmail || "").toLowerCase();

    return DISTANCE_FREE_TEST_EMAILS
        .map(item => String(item).toLowerCase())
        .includes(email);

/* 앱 시작 시 지하철 데이터와 방문기록을 불러온다. */
loadSubwayData();
loadHistory();
updateStampSummary();
renderGallery();

/*
    subway.json 파일을 읽어와 subwayData에 저장한다.
    데이터 로딩 후 현재 선택된 지역의 호선 목록도 같이 생성한다.
*/
async function loadSubwayData() {
    
    try{
        const response = await fetch('./subway.json');
        subwayData = await response.json();
        loadLineOptions();
        updateStampSummary();
    }catch(e){
        console.log(e);
        showToast("지하철 데이터를 불러오지 못했습니다.");
    }
}

/*
    지역 select가 변경됐을 때 실행된다.
    랜덤 결과를 초기화하고, 호선 고정용 호선 목록을 새 지역 기준으로 다시 만든다.
*/
function onRegionChanged(){
    resetRandomResult();
    loadLineOptions();
}

/*
    현재 선택된 지역에 해당하는 호선 목록을 lineSelect에 채운다.
    호선 고정 체크 여부와 관계없이 목록은 항상 최신 상태로 유지한다.
*/
function loadLineOptions(){

    const lineSelect = document.getElementById("lineSelect");

    lineSelect.innerHTML = `<option value="">호선 선택</option>`;

    if(subwayData === null){
        return;
    }

    const regionKey = document.getElementById("region").value;
    const regionData = subwayData.regions[regionKey];

    if(!regionData || !regionData.lines){
        return;
    }

    regionData.lines.forEach(function(line, index){
        lineSelect.innerHTML += `
            <option value="${index}">
                ${line.name}
            </option>
        `;
    });
}

/*
    호선 고정 체크박스를 켜거나 끌 때 실행된다.
    체크 시 호선 선택 select를 활성화하고, 해제 시 비활성화한다.
*/
function toggleLineLock(){

    const checked = document.getElementById("lineLockYn").checked;
    const lineSelect = document.getElementById("lineSelect");

    lineSelect.disabled = !checked;

    if(!checked){
        lineSelect.value = "";
    }

    resetRandomResult();
    loadLineOptions();
}

/*
    호선 고정 여부에 따라 랜덤 대상 호선을 반환한다.
    - 호선 고정 ON: 사용자가 선택한 호선 반환
    - 호선 고정 OFF: 지역 내 전체 호선 중 랜덤 반환
*/
function getSelectedLine(lines){

    const lineLockYn = document.getElementById("lineLockYn").checked;
    const lineSelect = document.getElementById("lineSelect");

    if(lineLockYn){

        if(lineSelect.value === ""){
            showToast("호선을 선택해주세요.");
            return null;
        }

        return lines[Number(lineSelect.value)];
    }

    return lines[
        Math.floor(Math.random() * lines.length)
    ];
}
let isDrawing = false;

function startDrawAnimation(){

    if(isDrawing){
        return;
    }

    if(subwayData === null){
        showToast("지하철 데이터를 불러오는 중입니다.");
        return;
    }

    isDrawing = true;

    const drawBtn = document.getElementById("drawBtn");
    drawBtn.disabled = true;
    drawBtn.innerText = "🚇 추첨 중...";

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("saveArea").style.display = "none";
    document.getElementById("mapCard").style.display = "none";

    const regionKey = document.getElementById("region").value;
    const regionData = subwayData.regions[regionKey];

    if(!regionData){
        showToast("선택한 지역 데이터가 없습니다.");
        endDrawAnimation();
        return;
    }

    const lineLockYn = document.getElementById("lineLockYn").checked;
    const lineSelect = document.getElementById("lineSelect");

    let animationLines = [];

    if(lineLockYn){

        if(lineSelect.value === ""){
            showToast("호선을 선택해주세요.");
            endDrawAnimation();
            return;
        }

        animationLines = [
            regionData.lines[Number(lineSelect.value)]
        ];

    }else{
        animationLines = regionData.lines;
    }

    let count = 0;
    const maxCount = 18;

    const timer = setInterval(function(){

        const randomLine = animationLines[
            Math.floor(Math.random() * animationLines.length)
        ];

        const randomStation = randomLine.stations[
            Math.floor(Math.random() * randomLine.stations.length)
        ];

        document.getElementById("regionResult").innerText = regionData.name;
        document.getElementById("lineResult").innerText = randomLine.name;
        document.getElementById("stationIndex").innerText = "추첨중";
        document.getElementById("stationResult").innerText = randomStation;

        count++;

        if(count >= maxCount){
            clearInterval(timer);

            setTimeout(function(){
                drawStation();
                endDrawAnimation();
            }, 250);
        }

    }, 80);
}

function endDrawAnimation(){

    isDrawing = false;

    const drawBtn = document.getElementById("drawBtn");
    drawBtn.disabled = false;
    drawBtn.innerText = "🎲 아무데나 가기";
}

/*
    랜덤 목적지를 뽑는다.
    방문기록에 저장된 역은 제외하고, 호선 고정이 켜져 있으면 선택된 호선 안에서만 뽑는다.
*/
function drawStation(){

    if(subwayData === null){
        showToast("지하철 데이터를 불러오는 중입니다.");
        return;
    }

    const regionKey = document.getElementById("region").value;
    const regionData = subwayData.regions[regionKey];

    if(!regionData){
        showToast("선택한 지역 데이터가 없습니다.");
        return;
    }

    const regionName = regionData.name;
    const lines = regionData.lines;
    const randomLine = getSelectedLine(lines);

    if(randomLine === null){
        return;
    }

    let savedHistory = [];

    try{
        savedHistory = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        savedHistory = [];
    }

    const savedStations = savedHistory.map(item => item.station);

    const availableStations = randomLine.stations.filter(station =>
        !savedStations.includes(station)
    );

    if(availableStations.length === 0){
        showToast("이 호선의 역은 모두 저장된 기록에 있습니다.");
        return;
    }

    const randomIndex = Math.floor(
        Math.random() * availableStations.length
    );

    const stationName = availableStations[randomIndex];
    const originalIndex = randomLine.stations.indexOf(stationName);

    selectedStation = stationName;

    document.getElementById("regionResult").innerText = regionName;
    document.getElementById("lineResult").innerText = randomLine.name;
    document.getElementById("stationIndex").innerText = (originalIndex + 1) + "번째";
    document.getElementById("stationResult").innerText = stationName;
    document.getElementById("resultBox").style.display = "block";

    document.getElementById("saveArea").style.display =
        isSavedStation(stationName) ? "none" : "grid";

    selectedStationPosition = null;

    currentResult = {
        region: regionName,
        line: randomLine.name,
        order: (originalIndex + 1) + "번째",
        station: stationName,
        date: new Date().toLocaleString(),
        lat: null,
        lng: null,
        stamped: false,
        stampedDate: null
    };

    showMap(stationName + "역");
}

/*
    현재 뽑힌 목적지를 방문기록에 저장한다.
    아직 스탬프를 찍지 않은 기록이 있으면 새 기록 저장을 막는다.
*/
function saveHistory(){

    if(currentResult == null){
        showToast("먼저 목적지를 뽑아주세요.");
        return;
    }

    if(currentResult.lat === null || currentResult.lng === null){
        showToast("역 위치 정보를 불러오는 중입니다.");
        return;
    }

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    if(!Array.isArray(history)){
        history = [];
    }

    const unstampedExists = history.some(item =>
        item && item.stamped === false
    );

    if(unstampedExists){
        showToast("아직 방문 스탬프를 찍지 않은 기록이 있습니다.");
        return;
    }

    const exists = history.some(item =>
        item && item.station === currentResult.station
    );

    if(exists){
        showToast("이미 저장된 목적지입니다.");
        return;
    }

    const saveItem = {
        ...currentResult,
        stamped: false,
        stampedDate: null
    };

    history.unshift(saveItem);

    localStorage.setItem(
        "amudenaHistory",
        JSON.stringify(history)
    );


    if(window.saveUserDataToCloud){
        window.saveUserDataToCloud();
    }

    showToast("방문기록 저장 완료");

    loadHistory();
    updateStampSummary();
}

/*
    localStorage의 방문기록을 읽어 방문기록 탭에 카드 형태로 렌더링한다.
    방문 완료 카드에는 삭제 버튼을 보여주지 않는다.
*/
function loadHistory(){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    const historyList = document.getElementById("historyList");

    if(history.length === 0){
        historyList.innerHTML = "저장된 기록이 없습니다.";
        return;
    }

    let html = "";

    history.forEach((item, idx)=>{

        const deletableClass = (!item.stamped || isTestUser()) ? "has-delete" : "";

        html += `
        <div class="history-card ${deletableClass}">
            ${(!item.stamped || isTestUser()) ? `
                <button
                    class="delete-btn"
                    onclick="deleteHistory(${idx})">
                    ✕
                </button>
            ` : ``}

            <div class="history-info">
                ${item.region} > ${item.line} > ${item.order}
            </div>

            <div class="history-station">
                🚆 ${item.station}역
            </div>

            <div class="history-date">
                저장일 : ${item.date}
            </div>

            ${item.stamped ? `
                <button class="stamp-btn done" disabled>
                    ✅ 방문 완료 ${item.stampedDate ? item.stampedDate : ""}
                </button>
            ` : `
                <button
                    class="stamp-btn"
                    id="stampBtn_${idx}"
                    onclick="stampHistory(${idx})"
                    disabled>
                    위치 확인 중...
                </button>
            `}
            ${item.stamped ? `
                <button class="photo-btn" onclick="openPhotoPicker(${idx})" style="display:none;">
                    📷 사진 추가
                </button>

                <input
                    type="file"
                    accept="image/*"
                    id="photoInput_${idx}"
                    style="display:none;"
                    onchange="saveVisitPhoto(${idx}, this)"
                >
            ` : ``}
        </div>
        `;
    });

    historyList.innerHTML = html;
    updateStampButtons();
}

/*
    미방문 방문기록을 삭제한다.
    커스텀 confirm 모달에서 확인을 누르면 실제 삭제가 진행된다.
*/
function deleteHistory(index){

    showConfirm(
        "삭제하시겠습니까?",
        function(){

            let history = [];

            try{
                history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
            }catch(e){
                history = [];
            }

            const deletedStation = history[index].station;

            history.splice(index, 1);

            localStorage.setItem(
                "amudenaHistory",
                JSON.stringify(history)
            );

            if(window.deleteUserHistoryFromCloud){
                window.deleteUserHistoryFromCloud(deletedStation);
            }
            
            if(window.saveUserDataToCloud){
                window.saveUserDataToCloud();
            }

            loadHistory();
            updateStampSummary();
        }
    );
}

/*
    방문기록 전체를 초기화한다.
    현재 화면에서는 전체 삭제 버튼을 숨겨두었지만, 추후 설정 탭에서 연결할 수 있다.
*/
function clearHistory(){

    showConfirm(
        "전체 방문기록을 삭제하시겠습니까?",
        function(){
            localStorage.removeItem("amudenaHistory");
            if(window.clearUserHistoryFromCloud){
                window.clearUserHistoryFromCloud();
            }
            if(window.saveUserDataToCloud){
                window.saveUserDataToCloud();
            }
            loadHistory();
            updateStampSummary();
        }
    );
}

/*
    카카오 장소 검색으로 역 좌표를 찾고, 랜덤 결과 지도에 마커를 표시한다.
    찾은 좌표는 currentResult에도 저장해서 방문기록 저장 시 같이 보관한다.
*/
function showMap(stationName){

    document.getElementById("mapCard").style.display = "block";

    const mapContainer = document.getElementById("map");
    const ps = new kakao.maps.services.Places();

    ps.keywordSearch(stationName, function(data, status){

        if(status !== kakao.maps.services.Status.OK){
            showToast("역 위치를 찾지 못했습니다.");
            return;
        }

        const place = data[0];
        const position = new kakao.maps.LatLng(place.y, place.x);

        selectedStationPosition = {
            lat: Number(place.y),
            lng: Number(place.x)
        };

        if(currentResult !== null){
            currentResult.lat = selectedStationPosition.lat;
            currentResult.lng = selectedStationPosition.lng;
        }

        if(map === null){
            map = new kakao.maps.Map(mapContainer, {
                center: position,
                level: 4
            });
        }else{
            map.setCenter(position);
        }

        if(marker !== null){
            marker.setMap(null);
        }

        marker = new kakao.maps.Marker({
            position: position
        });

        marker.setMap(map);
    });
}

    현재 뽑힌 역을 카카오맵 검색 화면으로 연다.

/*
    현재 GPS 위치를 기준으로 지역 select 값을 자동 선택한다.
    현재는 버튼이 숨겨져 있지만, 필요 시 버튼을 노출하면 사용할 수 있다.
*/
function selectRegionByLocation(){

    if(!navigator.geolocation){
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position){

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const regionKey = getRegionByLatLng(lat, lng);

            if(regionKey === null){
                return;
            }

            document.getElementById("region").value = regionKey;
            onRegionChanged();
        },
        function(error){
            console.log(error);
        },
        {
            enableHighAccuracy: false,
            timeout: 3000,
            maximumAge: 600000
        }
    );
}

/*
    위도/경도 값을 보고 지원 지역 키를 반환한다.
    현재는 대략적인 박스 범위로 수도권/부산/대구/대전/광주를 구분한다.
*/
function getRegionByLatLng(lat, lng){

    if(lat >= 37.0 && lat <= 38.3 && lng >= 126.0 && lng <= 128.0){
        return "metro";
    }

    if(lat >= 35.0 && lat <= 35.4 && lng >= 128.8 && lng <= 129.3){
        return "busan";
    }

    if(lat >= 35.7 && lat <= 36.0 && lng >= 128.4 && lng <= 128.8){
        return "daegu";
    }

    if(lat >= 36.2 && lat <= 36.5 && lng >= 127.2 && lng <= 127.6){
        return "daejeon";
    }

    if(lat >= 35.0 && lat <= 35.3 && lng >= 126.7 && lng <= 127.0){
        return "gwangju";
    }

    return null;
}

    현재 뽑힌 역 기준으로 카카오맵 검색을 연다.

/*
    두 좌표 사이의 거리를 미터 단위로 계산한다.
    방문 스탬프 가능 여부를 판단할 때 사용한다.
*/
function getDistanceMeter(lat1, lng1, lat2, lng2){

    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c;
}

/*
    방문기록 탭에 표시된 스탬프 버튼 상태를 갱신한다.
    현재 위치와 저장된 역 좌표 거리가 150m 이내이면 버튼을 활성화한다.
*/
function updateStampButtons(){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    const needCheck = history.some(item =>
        item && !item.stamped && item.lat !== null && item.lng !== null
    );

    if(!needCheck){
        history.forEach(function(item, idx){
            const btn = document.getElementById("stampBtn_" + idx);
            if(btn){
                btn.disabled = true;
                btn.innerText = "역 위치 정보 없음";
            }
        });
        return;
    }

    if(isDistanceFreeTestUser()){
        history.forEach(function(item, idx){

            const btn = document.getElementById("stampBtn_" + idx);

            if(!btn || item.stamped){
                return;
            }

            btn.disabled = false;
            btn.classList.add("ready");
            btn.innerText = "🧪 테스트 계정 - 방문 스탬프 찍기";
        });
        return;
    }

    if(!navigator.geolocation){
        history.forEach(function(item, idx){
            const btn = document.getElementById("stampBtn_" + idx);
            if(btn){
                btn.disabled = true;
                btn.innerText = "위치 지원 안됨";
            }
        });
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position){

            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            history.forEach(function(item, idx){

                const btn = document.getElementById("stampBtn_" + idx);

                if(!btn || item.stamped){
                    return;
                }

                if(item.lat === null || item.lng === null){
                    btn.disabled = true;
                    btn.innerText = "역 위치 정보 없음";
                    return;
                }

                const distance = getDistanceMeter(
                    userLat,
                    userLng,
                    item.lat,
                    item.lng
                );

                if(distance <= 150){
                    btn.disabled = false;
                    btn.classList.add("ready");
                    btn.innerText = "🎉 방문 스탬프 찍기";
                }else{
                    btn.disabled = true;
                    btn.classList.remove("ready");
                    btn.innerText = "역에서 150m 이내로 이동해주세요. (" + Math.round(distance) + "m)";
                }
            });
        },
        function(error){
            console.log(error);

            history.forEach(function(item, idx){
                const btn = document.getElementById("stampBtn_" + idx);
                if(btn){
                    btn.disabled = true;
                    btn.innerText = "위치 권한 필요";
                }
            });
        },
        {
            enableHighAccuracy:false,
            timeout:5000,
            maximumAge:30000
        }
    );
}

/*
    방문기록의 특정 항목을 방문 완료 상태로 변경한다.
    스탬프 날짜를 저장하고 방문기록/통계를 다시 갱신한다.
*/
function stampHistory(index){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    if(!history[index]){
        return;
    }

    const beforeStampedCount = history.filter(item =>
        item && item.stamped === true
    ).length;

    const beforeRank = getAdventureRank(beforeStampedCount);

    history[index].stamped = true;
    history[index].stampedDate = new Date().toLocaleString();

    localStorage.setItem(
        "amudenaHistory",
        JSON.stringify(history)
    );

    if(window.saveUserDataToCloud){
        window.saveUserDataToCloud();
    }

    const afterStampedCount = history.filter(item =>
        item && item.stamped === true
    ).length;

    const afterRank = getAdventureRank(afterStampedCount);

    if(afterRank.level > beforeRank.level){
        showToast("🎉 LEVEL UP! Lv." + afterRank.level + " " + afterRank.title);
    }else{
        showToast("🎉 " + history[index].station + "역 방문 스탬프 완료! EXP +10");
    }

    loadHistory();
    updateStampSummary();
}


/*
    지역별 방문 완료 개수 기준으로 지역 업적 등급을 반환한다.
*/
function getRegionRank(count){

    if(count >= 101){
        return { medal:"👑", title:"마스터", max:null };
    }

    if(count >= 61){
        return { medal:"🥇", title:"정복자", max:100 };
    }

    if(count >= 31){
        return { medal:"🥈", title:"개척자", max:60 };
    }

    if(count >= 11){
        return { medal:"🥉", title:"탐험가", max:30 };
    }

    if(count >= 1){
        return { medal:"🏅", title:"입문자", max:10 };
    }

    return { medal:"🔒", title:"미방문", max:1 };
}

/*
    설정 탭의 지역별 업적 목록을 렌더링한다.
*/
function renderRegionAchievements(history){

    const regionAchievementList = document.getElementById("regionAchievementList");

    if(!regionAchievementList){
        return;
    }

    const regionBaseList = [
        { key:"수도권", icon:"🏙️" },
        { key:"부산", icon:"🌊" },
        { key:"대구", icon:"🌳" },
        { key:"대전", icon:"🧪" },
        { key:"광주", icon:"🌸" }
    ];

    const stampedHistory = history.filter(item =>
        item && item.stamped === true
    );

    let html = "";

    regionBaseList.forEach(function(region){

        const count = stampedHistory.filter(item =>
            item.region === region.key
        ).length;

        const totalStationCount = getTotalStationCountByRegion(region.key);
        const percent = totalStationCount === 0
            ? 0
            : Math.round((count / totalStationCount) * 100);

        const rank = getRegionPercentRank(percent);
        const progressText = count + " / " + totalStationCount;

        html += `
            <div class="region-achievement-item">
                <div class="region-achievement-main">
                    <div class="region-achievement-icon">${region.icon}</div>
                    <div class="region-achievement-info">
                        <div class="region-achievement-name">${region.key}</div>
                        <div class="region-achievement-rank">${rank.medal} ${rank.title}</div>
                    </div>
                    <div class="region-achievement-count">${count}<small>개</small></div>
                </div>

                <div class="region-achievement-progress-row">
                    <div class="region-achievement-progress">
                        <div class="region-achievement-progress-bar" style="width:${percent}%;"></div>
                    </div>
                    <div class="region-achievement-progress-text">${progressText}</div>
                </div>
            </div>
        `;
    });

    regionAchievementList.innerHTML = html;
}

/*
    설정 탭의 스탬프 현황 숫자를 갱신한다.
    방문 예정/방문 완료/전체 기록 수를 계산한다.
*/
function updateStampSummary(){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    const stampedCount = history.filter(item =>
        item && item.stamped === true
    ).length;

    const totalStationCount = getTotalStationCountAll();

    const percent = totalStationCount === 0
        ? 0
        : Math.min(100, Math.round((stampedCount / totalStationCount) * 100));

    document.getElementById("adventureCount").innerText = stampedCount;

    updateAdventureExpUI(stampedCount, totalStationCount);

    document.getElementById("adventureProgressBar").style.width = percent + "%";

    document.getElementById("adventureProgressText").innerText =
        totalStationCount === 0
            ? "0 / 0"
            : stampedCount + " / " + totalStationCount;

    const message = document.getElementById("adventureMessage");

    if(stampedCount === 0){
        message.innerText = "첫 방문 완료를 기다리고 있어요.";
    }else{
        message.innerText = "전체 역 중 " + percent + "% 방문했어요.";
    }

    renderRegionAchievements(history);
    updateHeaderProfile();
}

/*
    방문 완료된 역만 카카오맵에 마커로 표시한다.
    마커를 클릭하면 역명과 노선 정보가 InfoWindow로 열린다.
*/
function showVisitedMap(){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    const visitedList = history.filter(item =>
        item &&
        item.stamped === true &&
        item.lat !== null &&
        item.lng !== null
    );

    if(visitedList.length === 0){
        showToast("방문 완료된 역이 없습니다.");
        return;
    }

    const mapBox = document.getElementById("visitedMap");
    mapBox.style.display = "block";

    const first = visitedList[0];
    const center = new kakao.maps.LatLng(first.lat, first.lng);

    if(visitedMap === null){
        visitedMap = new kakao.maps.Map(mapBox, {
            center: center,
            level: 8
        });
    }else{
        visitedMap.setCenter(center);
    }

    visitedMarkers.forEach(marker => marker.setMap(null));
    visitedMarkers = [];

    const bounds = new kakao.maps.LatLngBounds();

    visitedList.forEach(item => {

        const position = new kakao.maps.LatLng(item.lat, item.lng);

        const marker = new kakao.maps.Marker({
            position: position
        });

        marker.setMap(visitedMap);
        visitedMarkers.push(marker);
        bounds.extend(position);

        const infoWindow = new kakao.maps.InfoWindow({
            content: `
            <div style="padding:8px 10px;font-size:13px;line-height:1.5;">
                <b>${item.station}역</b><br>
                ${item.region} · ${item.line}<br>
                <span style="color:#666;">
                    방문일 : ${item.stampedDate || "-"}
                </span>
            </div>
            `
        });

        let opened = false;
        kakao.maps.event.addListener(marker, "click", function(){
            if(opened){
                infoWindow.close();
                opened = false;
            }else{
                infoWindow.open(visitedMap, marker);
                opened = true;
            }
        });
    });

    visitedMap.setBounds(bounds);
}

function getPhotosFromItem(item){

    if(!item){
        return [];
    }

    if(Array.isArray(item.photos)){
        return item.photos;
    }

    // 예전 단일 photo 구조를 읽을 수 있게 호환 처리한다.
    if(item.photo){
        return [{
            url: item.photo,
            date: item.photoDate || item.stampedDate || "",
            path: null
        }];
    }

    return [];
}

function resizeImageFile(file, maxWidth, quality){

    return new Promise(function(resolve, reject){

        const reader = new FileReader();

        reader.onload = function(e){

            const img = new Image();

            img.onload = function(){

                const ratio = Math.min(1, maxWidth / img.width);
                const width = Math.round(img.width * ratio);
                const height = Math.round(img.height * ratio);

                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob(
                    function(blob){
                        if(!blob){
                            reject(new Error("이미지 압축에 실패했습니다."));
                            return;
                        }

                        resolve(blob);
                    },
                    "image/jpeg",
                    quality
                );
            };

            img.onerror = function(){
                reject(new Error("이미지를 읽지 못했습니다."));
            };

            img.src = e.target.result;
        };

        reader.onerror = function(){
            reject(new Error("파일을 읽지 못했습니다."));
        };

        reader.readAsDataURL(file);
    });
}

function blobToDataUrl(blob){

    return new Promise(function(resolve, reject){

        const reader = new FileReader();

        reader.onload = function(e){
            resolve(e.target.result);
        };

        reader.onerror = function(){
            reject(new Error("이미지 변환에 실패했습니다."));
        };

        reader.readAsDataURL(blob);
    });
}

async function saveVisitPhoto(index, input){

    const file = input.files[0];

    if(!file){
        return;
    }

    const allowedTypes = [
        "image/jpeg",
        "image/png",
        "image/webp"
    ];

    const fileName = String(file.name || "").toLowerCase();
    const isHeic =
        file.type === "image/heic" ||
        file.type === "image/heif" ||
        fileName.endsWith(".heic") ||
        fileName.endsWith(".heif");

    if(isHeic){
        showToast("아이폰 HEIC 사진은 지원하지 않습니다. JPG로 변환 후 등록해주세요.");
        input.value = "";
        return;
    }

    if(!allowedTypes.includes(file.type)){
        showToast("JPG, PNG, WEBP 사진만 등록할 수 있습니다.");
        input.value = "";
        return;
    }

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(err){
        history = [];
    }

    if(!history[index]){
        input.value = "";
        return;
    }

    if(!window.uploadVisitPhotoToStorage || !window.currentUserUid){
        showToast("로그인 또는 Firebase Storage 연결을 확인해주세요.");
        input.value = "";
        return;
    }

    try{
        showToast("사진을 저장하는 중입니다.");

        const uploadFile = file;
        const nowText = new Date().toLocaleString();

        const uploaded = await window.uploadVisitPhotoToStorage(
            history[index].station,
            uploadFile,
            file.name
        );

        const photoData = {
            url: uploaded.url,
            path: uploaded.path,
            date: nowText
        };

        if(!Array.isArray(history[index].photos)){
            history[index].photos = getPhotosFromItem(history[index]);
        }

        delete history[index].photo;
        delete history[index].photoDate;

        history[index].photos.push(photoData);

        localStorage.setItem(
            "amudenaHistory",
            JSON.stringify(history)
        );

        if(window.saveUserDataToCloud){
            await window.saveUserDataToCloud();
        }

        showToast("사진이 추가되었습니다.");

        input.value = "";
        loadHistory();
        renderGallery();

    }catch(e){
        console.error(e);
        showToast(e.message || "사진 저장에 실패했습니다.");
        input.value = "";
    }
}

function renderGallery(){

    let history = [];

    try{
        history = JSON.parse(localStorage.getItem("amudenaHistory")) || [];
    }catch(e){
        history = [];
    }

    const galleryList = document.getElementById("galleryList");

    if(!galleryList){
        return;
    }

    const photoList = [];

    history.forEach(function(item, historyIndex){

        const photos = getPhotosFromItem(item);

        photos.forEach(function(photo, photoIndex){
            photoList.push({
                historyIndex: historyIndex,
                photoIndex: photoIndex,
                station: item.station,
                line: item.line,
                url: photo.url,
                path: photo.path || null,
                date: photo.date || item.stampedDate || ""
            });
        });
    });

    if(photoList.length === 0){
        galleryList.innerHTML = "사진이 없습니다.";
        return;
    }

    photoList.sort(function(a, b){
        return String(b.date).localeCompare(String(a.date));
    });

    let html = "";

    photoList.forEach(function(photo){

        html += `
            <div class="gallery-item">
                <button
                    class="gallery-delete-btn"
                    onclick="deletePhoto(${photo.historyIndex}, ${photo.photoIndex})">
                    ✕
                </button>
                <img src="${photo.url}" alt="${photo.station}역 사진">

                <div class="gallery-info">
                    <div class="gallery-station">
                        🚆 ${photo.station}역
                    </div>
                    <div class="gallery-date">
                        ${photo.date || ""}
                    </div>
                </div>
            </div>
        `;
    });

    galleryList.innerHTML = html;
}

function getTotalStationCountByRegion(regionName){

    if(!subwayData || !subwayData.regions){
        return 0;
    }

    let total = 0;

    Object.keys(subwayData.regions).forEach(function(regionKey){

        const regionData = subwayData.regions[regionKey];

        if(regionData.name !== regionName){
            return;
        }

        regionData.lines.forEach(function(line){
            total += line.stations.length;
        });
    });

    return total;
}

/*
    EXP 기준으로 레벨과 칭호를 계산한다.
    - 방문 스탬프 1개 = EXP 10
    - levelStartExp: 현재 레벨 시작 EXP
    - nextExp: 다음 레벨 필요 EXP
*/
function getAdventureRankByExp(exp){

    const levels = [
        { level:1, title:"신입 모험가", minExp:0, medal:"🏅" },
        { level:2, title:"초급 모험가", minExp:100, medal:"🥉" },      // 10역
        { level:3, title:"동네 탐험가", minExp:300, medal:"🥉" },      // 30역
        { level:4, title:"지하철 여행자", minExp:600, medal:"🥈" },    // 60역
        { level:5, title:"숙련 모험가", minExp:1000, medal:"🥈" },     // 100역
        { level:6, title:"노선 개척자", minExp:2000, medal:"🥇" },     // 200역
        { level:7, title:"지역 정복자", minExp:3500, medal:"🥇" },     // 350역
        { level:8, title:"전국 탐험가", minExp:5500, medal:"👑" },     // 550역
        { level:9, title:"지하철 마스터", minExp:7500, medal:"👑" },   // 750역
        { level:10, title:"전설의 모험가", minExp:9740, medal:"🌟" }   // 974역
    ];

    let current = levels[0];
    let next = levels[1];

    for(let i = 0; i < levels.length; i++){
        if(exp >= levels[i].minExp){
            current = levels[i];
            next = levels[i + 1] || null;
        }
    }

    const levelStartExp = current.minExp;
    const nextExp = next ? next.minExp : current.minExp;
    const currentLevelExp = exp - levelStartExp;
    const needLevelExp = next ? next.minExp - levelStartExp : 0;
    const percent = next
        ? Math.min(100, Math.round((currentLevelExp / needLevelExp) * 100))
        : 100;

    return {
        level: current.level,
        title: current.title,
        medal: current.medal,
        exp: exp,
        levelStartExp: levelStartExp,
        nextExp: nextExp,
        currentLevelExp: currentLevelExp,
        needLevelExp: needLevelExp,
        percent: percent,
        isMax: next === null
    };
}

/*
    기존 함수명 유지용 래퍼.
    count는 방문 완료 역 수이고, 내부에서 EXP로 변환한다.
*/
function getAdventureRank(count){
    return getAdventureRankByExp(getExpByStampedCount(count));
}

}

async function deletePhoto(historyIndex, photoIndex){

    showConfirm(
        "사진을 삭제하시겠습니까?",
        async function(){

            let history = [];

            try{
                history = JSON.parse(
                    localStorage.getItem("amudenaHistory")
                ) || [];
            }catch(e){
                history = [];
            }

            const item = history[historyIndex];

            if(!item){
                return;
            }

            if(!Array.isArray(item.photos)){
                item.photos = getPhotosFromItem(item);
            }

            const deletedPhoto = item.photos[photoIndex];

            if(!deletedPhoto){
                return;
            }

            if(window.deleteVisitPhotoFromStorage && deletedPhoto.path){
                await window.deleteVisitPhotoFromStorage(deletedPhoto.path);
            }

            item.photos.splice(photoIndex, 1);

            delete item.photo;
            delete item.photoDate;

            localStorage.setItem(
                "amudenaHistory",
                JSON.stringify(history)
            );

            if(window.saveUserDataToCloud){
                await window.saveUserDataToCloud();
            }

            renderGallery();
            loadHistory();

            showToast("사진 삭제 완료");
        }
    );
}

const tutorialSteps = [

];

function openTutorial() {
    tutorialIndex = 0;
    document.getElementById("tutorialModal").style.display = "flex";
    renderTutorialStep();
}

function closeTutorial() {
    document.getElementById("tutorialModal").style.display = "none";
}

function renderTutorialStep() {

    document.getElementById("tutorialStepText").innerText =
        tutorialSteps[tutorialIndex];

    const prevBtn = document.getElementById("tutorialPrevBtn");
    const nextBtn = document.getElementById("tutorialNextBtn");

    // 첫 페이지
    if (tutorialIndex === 0) {
        prevBtn.style.display = "none";
        nextBtn.innerText = "다음";
    }
    // 마지막 페이지
    else if (tutorialIndex === tutorialSteps.length - 1) {
        prevBtn.style.display = "block";
        nextBtn.innerText = "닫기";
    }
    // 중간 페이지
    else {
        prevBtn.style.display = "block";
        nextBtn.innerText = "다음";
    }
}

function nextTutorialStep() {

    if (tutorialIndex === tutorialSteps.length - 1) {
        closeTutorial();
        return;
    }

    tutorialIndex++;
    renderTutorialStep();
}

function prevTutorialStep() {
    if (tutorialIndex > 0) {
        tutorialIndex--;
    } else {
        tutorialIndex = tutorialSteps.length - 1;
    }

    renderTutorialStep();
}
