<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>아~무~데~나</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8fafc;
    font-family:'Pretendard', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.splash-container{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:40px 24px;
}

.logo{
    font-size:80px;
    margin-bottom:20px;
}

.title{
    font-size:38px;
    font-weight:800;
    color:#111827;
    margin-bottom:10px;
}

.subtitle{
    font-size:15px;
    color:#6b7280;
    line-height:1.6;
    margin-bottom:40px;
}

.google-btn{
    width:100%;
    border:none;
    border-radius:14px;
    background:#4285F4;
    color:white;
    font-size:16px;
    font-weight:600;
    padding:16px;
    cursor:pointer;
    transition:0.2s;
}

.google-btn:hover{
    opacity:0.9;
}

.footer{
    margin-top:30px;
    color:#9ca3af;
    font-size:12px;
}
</style>
</head>

<body>

<div class="splash-container">

    <div class="logo">🚇</div>

    <div class="title">
        아~무~데~나
    </div>

    <div class="subtitle">
        랜덤 지하철 여행<br>
        방문기록과 업적을 저장해보세요
    </div>

    <button id="loginBtn" class="google-btn">
        Google 로그인
    </button>

    <div class="footer">
        로그인 후 이용 가능합니다.
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDcFHogdIhpiTopWNuKPg_BjPOrE0ZpZHw",
    authDomain: "compensation-cf2f8.firebaseapp.com",
    databaseURL: "https://compensation-cf2f8.firebaseio.com",
    projectId: "compensation-cf2f8",
    storageBucket: "compensation-cf2f8.firebasestorage.app",
    messagingSenderId: "1075779261298",
    appId: "1:1075779261298:web:b203b15ae60abad87103eb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({
    prompt: "select_account"
});
onAuthStateChanged(auth, function(user){
    if(user){
        location.href = "main.html";
    }
});

document.getElementById("loginBtn").addEventListener("click", function(){
    signInWithPopup(auth, provider)
        .then(function(){
            location.href = "main.html";
        })
        .catch(function(error){
            console.log(error);
            alert("로그인 실패");
        });
});
</script>

</body>
</html>
